<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SMUnity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-hands-helping me-2"></i>SMUnity
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-custom">
                        <div class="card-header text-center bg-primary text-white">
                            <h3 class="mb-0">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </h3>
                            <p class="mb-0 mt-2 opacity-75">Welcome back to SMUnity</p>
                        </div>
                        <div class="card-body p-4">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-envelope"></i>
                                        </span>
                                        <input type="email" class="form-control" id="email" name="email" 
                                               placeholder="your.email@smu.edu.sg" required>
                                    </div>
                                    <div class="invalid-feedback" id="emailError"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                        <input type="password" class="form-control" id="password" name="password" 
                                               placeholder="Enter your password" required>
                                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="invalid-feedback" id="passwordError"></div>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                                        <span class="spinner-border spinner-border-sm me-2" style="display: none;"></span>
                                        <i class="fas fa-sign-in-alt me-2"></i>Login
                                    </button>
                                </div>

                                <div class="text-center">
                                    <a href="forgot-password.html" class="text-decoration-none">
                                        Forgot your password?
                                    </a>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center bg-light">
                            <p class="mb-0">
                                Don't have an account? 
                                <a href="register.html" class="text-primary fw-bold">Sign up here</a>
                            </p>
                        </div>
                    </div>

                    <!-- Demo Accounts -->
                    <div class="card mt-4">
                        <div class="card-header">
                            <h6 class="mb-0">
                                <i class="fas fa-info-circle me-2"></i>Demo Accounts
                            </h6>
                        </div>
                        <div class="card-body">
                            <div class="row g-2">
                                <div class="col-12">
                                    <button class="btn btn-outline-primary btn-sm w-100" onclick="fillDemoAccount('student')">
                                        <i class="fas fa-user-graduate me-1"></i>Student Account
                                    </button>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-outline-success btn-sm w-100" onclick="fillDemoAccount('leader')">
                                        <i class="fas fa-user-tie me-1"></i>CSP Leader Account
                                    </button>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-outline-warning btn-sm w-100" onclick="fillDemoAccount('admin')">
                                        <i class="fas fa-user-shield me-1"></i>Admin Account
                                    </button>
                                </div>
                            </div>
                            <small class="text-muted mt-2 d-block">
                                Password for all demo accounts: <code>password123</code>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>SMUnity</h5>
                    <p class="text-muted">Streamlining community service for SMU students</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted">&copy; 2024 SMUnity. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
