<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SMUnity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-hands-helping me-2"></i>SMUnity
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Back to Home</a>
            </div>
        </div>
    </nav>

    <!-- Registration Section -->
    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow-custom">
                        <div class="card-header text-center bg-primary text-white">
                            <h3 class="mb-0">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </h3>
                            <p class="mb-0 mt-2 opacity-75">Join the SMUnity community</p>
                        </div>
                        <div class="card-body p-4">
                            <form id="registerForm">
                                <!-- Role Selection -->
                                <div class="mb-4">
                                    <label class="form-label">Account Type</label>
                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <input type="radio" class="btn-check" name="role" id="roleStudent" value="student" checked>
                                            <label class="btn btn-outline-primary w-100" for="roleStudent">
                                                <i class="fas fa-user-graduate me-2"></i>Student
                                            </label>
                                        </div>
                                        <div class="col-md-6">
                                            <input type="radio" class="btn-check" name="role" id="roleLeader" value="csp_leader">
                                            <label class="btn btn-outline-success w-100" for="roleLeader">
                                                <i class="fas fa-user-tie me-2"></i>CSP Leader
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <!-- Personal Information -->
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="firstName" class="form-label">First Name</label>
                                            <input type="text" class="form-control" id="firstName" name="firstName" required>
                                            <div class="invalid-feedback" id="firstNameError"></div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="mb-3">
                                            <label for="lastName" class="form-label">Last Name</label>
                                            <input type="text" class="form-control" id="lastName" name="lastName" required>
                                            <div class="invalid-feedback" id="lastNameError"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-envelope"></i>
                                        </span>
                                        <input type="email" class="form-control" id="email" name="email" 
                                               placeholder="your.email@smu.edu.sg" required>
                                    </div>
                                    <div class="invalid-feedback" id="emailError"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="phone" class="form-label">Phone Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-phone"></i>
                                        </span>
                                        <input type="tel" class="form-control" id="phone" name="phone" 
                                               placeholder="+65 9123 4567" required>
                                    </div>
                                    <div class="invalid-feedback" id="phoneError"></div>
                                </div>

                                <!-- Student-specific fields -->
                                <div id="studentFields">
                                    <div class="row">
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="studentId" class="form-label">Student ID</label>
                                                <input type="text" class="form-control" id="studentId" name="studentId" 
                                                       placeholder="SMU2024001">
                                                <div class="invalid-feedback" id="studentIdError"></div>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="mb-3">
                                                <label for="year" class="form-label">Academic Year</label>
                                                <select class="form-select" id="year" name="year">
                                                    <option value="">Select Year</option>
                                                    <option value="Year 1">Year 1</option>
                                                    <option value="Year 2">Year 2</option>
                                                    <option value="Year 3">Year 3</option>
                                                    <option value="Year 4">Year 4</option>
                                                    <option value="Graduate">Graduate</option>
                                                </select>
                                                <div class="invalid-feedback" id="yearError"></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="major" class="form-label">Major</label>
                                        <input type="text" class="form-control" id="major" name="major" 
                                               placeholder="e.g., Business, Computer Science">
                                        <div class="invalid-feedback" id="majorError"></div>
                                    </div>

                                    <div class="mb-3">
                                        <label for="skills" class="form-label">Skills & Interests</label>
                                        <div class="row g-2" id="skillsContainer">
                                            <!-- Skills will be populated by JavaScript -->
                                        </div>
                                        <small class="text-muted">Select skills that match your interests and experience</small>
                                    </div>
                                </div>

                                <!-- CSP Leader-specific fields -->
                                <div id="leaderFields" style="display: none;">
                                    <div class="mb-3">
                                        <label for="organization" class="form-label">Organization</label>
                                        <input type="text" class="form-control" id="organization" name="organization" 
                                               placeholder="Your organization name">
                                        <div class="invalid-feedback" id="organizationError"></div>
                                    </div>
                                </div>

                                <!-- Password -->
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                        <input type="password" class="form-control" id="password" name="password" 
                                               placeholder="Create a strong password" required>
                                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="invalid-feedback" id="passwordError"></div>
                                    <div class="password-strength mt-2">
                                        <div class="progress" style="height: 5px;">
                                            <div class="progress-bar" id="passwordStrengthBar" style="width: 0%"></div>
                                        </div>
                                        <small class="text-muted" id="passwordStrengthText">Password strength</small>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <i class="fas fa-lock"></i>
                                        </span>
                                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                                               placeholder="Confirm your password" required>
                                    </div>
                                    <div class="invalid-feedback" id="confirmPasswordError"></div>
                                </div>

                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="agreeTerms" required>
                                    <label class="form-check-label" for="agreeTerms">
                                        I agree to the <a href="#" class="text-primary">Terms of Service</a> and 
                                        <a href="#" class="text-primary">Privacy Policy</a>
                                    </label>
                                    <div class="invalid-feedback" id="agreeTermsError"></div>
                                </div>

                                <div class="d-grid mb-3">
                                    <button type="submit" class="btn btn-primary btn-lg" id="registerBtn">
                                        <span class="spinner-border spinner-border-sm me-2" style="display: none;"></span>
                                        <i class="fas fa-user-plus me-2"></i>Create Account
                                    </button>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center bg-light">
                            <p class="mb-0">
                                Already have an account? 
                                <a href="login.html" class="text-primary fw-bold">Login here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>SMUnity</h5>
                    <p class="text-muted">Streamlining community service for SMU students</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p class="text-muted">&copy; 2024 SMUnity. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
